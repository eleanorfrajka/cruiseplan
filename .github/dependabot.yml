version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: 1
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "[CI]"
      include: "scope"
    reviewers:
      - "eleanorfrajka"
    assignees:
      - "eleanorfrajka"
    labels:
      - "github-actions"
      - "automated"
